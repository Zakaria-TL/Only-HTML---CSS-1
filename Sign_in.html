<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <link rel="stylesheet" href="Sign_in.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  </head>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document
        .querySelector(".submit button")
        .addEventListener("click", async (e) => {
          e.preventDefault(); // لمنع الصفحة من التحديث

          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          if (!username || !email || !password) {
            alert("Fill all fields");
            return;
          }

          try {
            const res = await fetch("http://localhost:3000/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ username, email, password }),
            });

            const data = await res.json();
            alert(data.message);
            if (res.ok) window.location.href = "Sign_up.html";
          } catch (error) {
            alert("Server is not responding!");
          }
        });
    });
  </script>
  <body>
    <div class="Sign_in_path">
      <div class="sign_in_button">
        <div class="title2">
          <h1>Welcome Back!</h1>
          <div class="descripe_2">
            <p>
              To keep connected with us please login with your personal info
            </p>
          </div>
        </div>
        <button onclick="location.href = 'Sign_up.html'">Sign in</button>
      </div>
    </div>
    <div class="page_content">
      <div class="title1">
        <h1>Create Account</h1>
      </div>
      <div class="social_media">
        <a href="#" class="fa fa-facebook"></a>
        <a href="#" class="fa fa-google"></a>
        <a href="#" class="fa fa-linkedin"></a>
      </div>
      <div class="descripe_1">
        <p>or use your email for registration</p>
      </div>
      <div class="inputs">
        <div class="name">
          <label for="username">
            <i class="fa fa-user icon"></i>
          </label>
          <input type="text" placeholder="Username" id="username" />
        </div>
        <div class="email">
          <label for="email">
            <i class="fa fa-envelope icon"></i>
          </label>
          <input type="email" placeholder="Email or phone number" id="email" />
        </div>
        <div class="password">
          <label for="password">
            <i class="fa fa-lock icon"></i>
          </label>
          <input type="password" placeholder="Password" id="password" />
        </div>
        <div class="submit">
          <button>Sign Up</button>
        </div>
      </div>
    </div>
  </body>
</html>
